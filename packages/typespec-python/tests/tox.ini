[tox]
envlist = test-{azure,unbranded}, lint-{azure,unbranded}, mypy-{azure,unbranded}, pyright-{azure,unbranded}
skipsdist = True
isolated_build = True

[testenv]
deps =
    -r {tox_root}/requirements/base.txt
setenv =
    FLAVOR = {envname}
passenv =
    FOLDER

# =============================================================================
# Test environments
# =============================================================================

[testenv:test-azure]
description = Run tests for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/azure.txt
commands =
    pip install --no-deps -e {tox_root}/generated/azure/authentication-api-key
    pip install --no-deps -e {tox_root}/generated/azure/authentication-http-custom
    pip install --no-deps -e {tox_root}/generated/azure/authentication-noauth-union
    pip install --no-deps -e {tox_root}/generated/azure/authentication-oauth2
    pip install --no-deps -e {tox_root}/generated/azure/authentication-union
    pip install --no-deps -e {tox_root}/generated/azure/azure-client-generator-core-access
    pip install --no-deps -e {tox_root}/generated/azure/azure-client-generator-core-usage
    pip install --no-deps -e {tox_root}/generated/azure/azure-core-basic
    pip install --no-deps -e {tox_root}/generated/azure/azure-core-lro-standard
    pip install --no-deps -e {tox_root}/generated/azure/special-words
    pytest mock_api/azure mock_api/shared -v {posargs}

[testenv:test-unbranded]
description = Run tests for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/unbranded.txt
commands =
    pip install --no-deps -e {tox_root}/generated/unbranded/authentication-api-key
    pip install --no-deps -e {tox_root}/generated/unbranded/authentication-http-custom
    pip install --no-deps -e {tox_root}/generated/unbranded/authentication-noauth-union
    pip install --no-deps -e {tox_root}/generated/unbranded/special-words
    pytest mock_api/unbranded mock_api/shared -v {posargs}

# =============================================================================
# Lint environments
# =============================================================================

[testenv:lint-azure]
description = Run linting for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/azure.txt
commands =
    pip install azure-pylint-guidelines-checker==0.5.2 --index-url="https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-python/pypi/simple/"
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t azure -s generated {posargs}

[testenv:lint-unbranded]
description = Run linting for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/unbranded.txt
commands =
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t unbranded -s generated {posargs}

# =============================================================================
# Type checking environments
# =============================================================================

[testenv:mypy-azure]
description = Run mypy type checking for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/azure.txt
commands =
    python {tox_root}/../eng/scripts/ci/run_mypy.py -t azure -s generated {posargs}

[testenv:mypy-unbranded]
description = Run mypy type checking for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/unbranded.txt
commands =
    python {tox_root}/../eng/scripts/ci/run_mypy.py -t unbranded -s generated {posargs}

[testenv:pyright-azure]
description = Run pyright type checking for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/azure.txt
commands =
    python {tox_root}/../eng/scripts/ci/run_pyright.py -t azure -s generated {posargs}

[testenv:pyright-unbranded]
description = Run pyright type checking for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/unbranded.txt
commands =
    python {tox_root}/../eng/scripts/ci/run_pyright.py -t unbranded -s generated {posargs}

# =============================================================================
# CI environments (combines all checks)
# =============================================================================

[testenv:ci-azure]
description = Run full CI for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/azure.txt
commands =
    pytest mock_api/azure mock_api/shared -v
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t azure -s generated
    python {tox_root}/../eng/scripts/ci/run_mypy.py -t azure -s generated
    python {tox_root}/../eng/scripts/ci/run_pyright.py -t azure -s generated

[testenv:ci-unbranded]
description = Run full CI for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/typecheck.txt
    -r {tox_root}/requirements/unbranded.txt
commands =
    pytest mock_api/unbranded mock_api/shared -v
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t unbranded -s generated
    python {tox_root}/../eng/scripts/ci/run_mypy.py -t unbranded -s generated
    python {tox_root}/../eng/scripts/ci/run_pyright.py -t unbranded -s generated
