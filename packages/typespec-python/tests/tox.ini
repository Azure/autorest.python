[tox]
envlist = test-{azure,unbranded}, lint-{azure,unbranded}, mypy-{azure,unbranded}, pyright-{azure,unbranded}, docs-{azure,unbranded}
skipsdist = True
isolated_build = True
requires = tox-uv

[testenv]
deps =
    -r {tox_root}/requirements/base.txt
setenv =
    FLAVOR = {envname}
passenv =
    FOLDER
allowlist_externals =
    pytest
    uv

# =============================================================================
# Test environments
# =============================================================================

[testenv:test-azure]
description = Run tests for Azure flavor
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/azure.txt
commands =
    python {tox_root}/install_packages.py azure {tox_root}
    pytest mock_api/azure mock_api/shared -v {posargs}

[testenv:test-unbranded]
description = Run tests for unbranded flavor
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    {[testenv]deps}
    -r {tox_root}/requirements/unbranded.txt
commands =
    python {tox_root}/install_packages.py unbranded {tox_root}
    pytest mock_api/unbranded mock_api/shared -v {posargs}

# =============================================================================
# Lint environments
# =============================================================================

[testenv:lint-azure]
description = Run linting for Azure flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = azure
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/azure.txt
commands =
    uv pip install azure-pylint-guidelines-checker==0.5.2 --index-url="https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-python/pypi/simple/"
    python {tox_root}/install_packages.py azure {tox_root}
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t azure -s generated {posargs}

[testenv:lint-unbranded]
description = Run linting for unbranded flavor
basepython = python3.10
setenv =
    {[testenv]setenv}
    FLAVOR = unbranded
deps =
    -r {tox_root}/requirements/lint.txt
    -r {tox_root}/requirements/unbranded.txt
commands =
    python {tox_root}/install_packages.py unbranded {tox_root}
    python {tox_root}/../eng/scripts/ci/run_pylint.py -t unbranded -s generated {posargs}

